<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave Field — Black &amp; White</title>

    <!--
  ============================================================
  RAW ANIMATED "WAVE FIELD" BACKGROUND  —  BLACK & WHITE
  ------------------------------------------------------------
  The same glowing-strand animation, recoloured to a dark
  monochrome look: white / silver strands weaving across a
  near-black field with soft grey light pools. NO text, NO
  links, NO colour. Pure Canvas 2D, NO libraries, NO images.

  * Standalone: save as  waves.html  and open it.
  * To put YOUR content on top later: wrap it in any element
    with  position:relative; z-index:1  (the canvas is fixed at
    z-index:0 and pointer-events:none, so it never blocks clicks).
  * Tune the look in the CONFIG object at the top of the script:
    LINE_COUNT (density), GLOW (bloom), SPEED, LIGHT range
    (strand brightness), SPARKLES on/off, and the body gradient.
  * Respects prefers-reduced-motion (one static frame) and
    pauses when the tab is hidden to save battery.
  ============================================================
-->

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        /* ---------- the dark monochrome field (black with soft grey light pools) ---------- */
        body {
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(120% 140% at 80% 50%, rgba(150, 150, 150, .16), transparent 60%),
                radial-gradient(95% 120% at 6% 46%, rgba(70, 70, 70, .20), transparent 56%),
                linear-gradient(180deg, #000000 0%, rgba(0, 0, 0, 0) 22%, rgba(0, 0, 0, 0) 78%, #000000 100%),
                #000000;
        }

        /* ---------- the background canvas (fixed, behind everything) ---------- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            pointer-events: none;
            /* clicks pass through to any content above */
        }
    </style>
</head>

<body>

    <!-- ============ THE ANIMATED BACKGROUND (that's all there is) ============ -->
    <canvas id="bgCanvas" class="bg-canvas" aria-hidden="true"></canvas>

    <script>
        (function () {
            'use strict';

            /* =========================================================
               CONFIG  — tweak the look here
               ========================================================= */
            var CONFIG = {
                LINE_COUNT: 18,        // number of glowing strands (more = denser weave)
                GLOW: 1.0,       // bloom multiplier (0.4 subtle .. 1.6 intense)
                SPEED: 1.0,       // overall animation speed
                LIGHT_MIN: 72,        // dimmest strand (light grey)
                LIGHT_MAX: 94,        // brightest strand (near white)
                SPARKLES: true,      // tiny travelling dots on the strands
                POINT_GAP: 9,         // px between curve samples (lower = smoother, slower)
                MOUSE: 0.55       // pointer reactivity (0 = none)
            };

            var REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            var TAU = Math.PI * 2;
            var rand = function (a, b) { return a + Math.random() * (b - a); };
            var clamp = function (v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; };
            /* monochrome helper: hue & saturation fixed at 0 -> pure grey/white */
            var grey = function (l, a) { return 'hsla(0,0%,' + l.toFixed(0) + '%,' + a + ')'; };

            var canvas = document.getElementById('bgCanvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d', { alpha: true });

            var W = 0, H = 0, DPR = 1;
            var lines = [];

            /* envelope: where the wave "packet" lives across the width (peaks mid-right) */
            function envelope(nx) {
                var g1 = Math.exp(-Math.pow((nx - 0.62) / 0.30, 2));
                var g2 = 0.5 * Math.exp(-Math.pow((nx - 0.18) / 0.22, 2));
                return clamp(g1 + g2, 0, 1.4);
            }

            /* vertical position of a strand at horizontal fraction nx */
            function yAt(L, nx, t, pmod) {
                var a1 = nx * L.freq * TAU + L.phase + t * L.spd + pmod;
                var a2 = nx * L.freq * 2.3 * TAU + L.phase * 1.7 + t * L.spd * 0.7 + pmod;
                var wave = 0.7 * Math.sin(a1) + 0.3 * Math.sin(a2);
                var sway = Math.sin(t * 0.25 + L.swayPhase) * H * 0.02;
                return L.baseY + L.ampF * H * envelope(nx) * wave + sway;
            }

            function buildLines() {
                lines = [];
                var n = CONFIG.LINE_COUNT;
                for (var i = 0; i < n; i++) {
                    var sparks = [];
                    if (CONFIG.SPARKLES) {
                        var sc = Math.floor(rand(1, 4));
                        for (var k = 0; k < sc; k++) {
                            sparks.push({ p: Math.random(), speed: rand(0.015, 0.05) * (Math.random() < 0.5 ? -1 : 1), size: rand(1.4, 3.2) });
                        }
                    }
                    lines.push({
                        ampF: 0.13 * rand(0.6, 1.5),
                        baseY: 0,                                   // set in resize
                        baseFrac: (i - (n - 1) / 2) * 0.013,
                        freq: rand(0.8, 2.0),
                        phase: rand(0, TAU),
                        spd: rand(0.15, 0.42) * (Math.random() < 0.5 ? -1 : 1),
                        l: rand(CONFIG.LIGHT_MIN, CONFIG.LIGHT_MAX),  // grey/white tone
                        bright: rand(0.7, 1.25),
                        swayPhase: rand(0, TAU),
                        sparks: sparks
                    });
                }
            }

            function resize() {
                DPR = Math.min(window.devicePixelRatio || 1, 2);
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = Math.floor(W * DPR);
                canvas.height = Math.floor(H * DPR);
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                for (var i = 0; i < lines.length; i++) lines[i].baseY = H * 0.5 + lines[i].baseFrac * H;
            }

            /* pointer parallax + phase influence (smoothed) */
            var ptr = { x: 0, y: 0, cx: 0, cy: 0, active: false, last: 0 };
            function onPointer(e) {
                ptr.x = (e.clientX / window.innerWidth) - 0.5;
                ptr.y = (e.clientY / window.innerHeight) - 0.5;
                ptr.active = true; ptr.last = performance.now();
            }
            window.addEventListener('pointermove', onPointer, { passive: true });
            window.addEventListener('pointerleave', function () { ptr.active = false; });

            /* stroke passes: wide faint halo -> bright thin core (additive glow) */
            var PASSES = [
                { w: 16, a: 0.022 },
                { w: 7, a: 0.055 },
                { w: 2.6, a: 0.20 },
                { w: 1.1, a: 0.85 }
            ];

            function draw(t) {
                /* smooth pointer; fall back to a gentle idle drift when idle */
                var idle = !ptr.active || (performance.now() - ptr.last > 1400);
                var autoX = Math.sin(t * 0.13) * 0.05;
                var autoY = Math.cos(t * 0.10) * 0.04;
                var gx = (idle ? autoX : ptr.x) * CONFIG.MOUSE;
                var gy = (idle ? autoY : ptr.y) * CONFIG.MOUSE;
                ptr.cx += (gx - ptr.cx) * 0.06;
                ptr.cy += (gy - ptr.cy) * 0.06;

                var pmod = ptr.cx * 0.9;                 // phase shift from horizontal pointer
                var offX = ptr.cx * 26;                  // parallax translate
                var offY = ptr.cy * 18;

                ctx.clearRect(0, 0, W, H);
                ctx.globalCompositeOperation = 'lighter';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                var segs = Math.max(40, Math.floor(W / CONFIG.POINT_GAP));

                for (var i = 0; i < lines.length; i++) {
                    var L = lines[i];

                    /* build the strand as a path + keep points for sparkles */
                    var path = new Path2D();
                    var pts = L.sparks.length ? [] : null;
                    for (var s = 0; s <= segs; s++) {
                        var nx = s / segs;
                        var x = nx * W + offX;
                        var y = yAt(L, nx, t, pmod) + offY;
                        if (s === 0) path.moveTo(x, y); else path.lineTo(x, y);
                        if (pts) pts.push({ x: x, y: y });
                    }

                    /* glow passes (monochrome) */
                    for (var p = 0; p < PASSES.length; p++) {
                        var ps = PASSES[p];
                        ctx.strokeStyle = grey(L.l, ps.a * L.bright * CONFIG.GLOW);
                        ctx.lineWidth = ps.w;
                        ctx.stroke(path);
                    }

                    /* travelling sparkles (white core + soft grey halo) */
                    if (pts && pts.length) {
                        for (var q = 0; q < L.sparks.length; q++) {
                            var sp = L.sparks[q];
                            sp.p += sp.speed * 0.016 * CONFIG.SPEED;
                            if (sp.p > 1) sp.p -= 1; else if (sp.p < 0) sp.p += 1;
                            var idx = Math.min(pts.length - 1, Math.max(0, Math.floor(sp.p * (pts.length - 1))));
                            var pt = pts[idx];
                            var r = sp.size * 2.4;
                            var g = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r);
                            g.addColorStop(0, 'rgba(255,255,255,' + (0.9 * CONFIG.GLOW).toFixed(2) + ')');
                            g.addColorStop(0.4, 'rgba(220,220,220,' + (0.55 * CONFIG.GLOW).toFixed(2) + ')');
                            g.addColorStop(1, 'rgba(255,255,255,0)');
                            ctx.fillStyle = g;
                            ctx.beginPath();
                            ctx.arc(pt.x, pt.y, r, 0, TAU);
                            ctx.fill();
                        }
                    }
                }

                ctx.globalCompositeOperation = 'source-over';
            }

            /* ---------- loop / static frame ---------- */
            var rafId = 0, running = true;
            function frame(now) {
                if (!running) return;
                draw((now / 1000) * CONFIG.SPEED);
                rafId = requestAnimationFrame(frame);
            }

            function start() {
                if (REDUCE) { draw(8.0); return; }     // one nice static frame
                running = true;
                rafId = requestAnimationFrame(frame);
            }
            function stop() { running = false; cancelAnimationFrame(rafId); }

            /* pause when tab hidden (save battery) */
            document.addEventListener('visibilitychange', function () {
                if (document.hidden) stop(); else if (!REDUCE) start();
            });

            /* ---------- init ---------- */
            buildLines();
            resize();
            start();

            var rT;
            window.addEventListener('resize', function () {
                clearTimeout(rT);
                rT = setTimeout(function () { resize(); if (REDUCE) draw(8.0); }, 120);
            });
        })();
    </script>
</body>

</html>
